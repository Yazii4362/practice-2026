<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOS Animation</title>

    <!-- AOS CSS -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>

    <style>
        .box {
            width: 100%;
            height: 100px;
            margin: 10px 0;
        }

        .box:nth-child(1) { background-color: #ffe25f;}
        .box:nth-child(2) { background: orange; }
        .box:nth-child(3) { background: yellow; }
        .box:nth-child(4) { background: green; }
        .box:nth-child(5) { background: blue; }
        .box:nth-child(6) { background: indigo; }
        .box:nth-child(7) { background: violet; }
    </style>
</head>

<body>

    <div class="box"data-aos="fade-up" ></div>
    <div class="box" data-aos="fade-down-right"></div>
    <div class="box" data-aos="fade-right" data-aos-delay="300" data-aos-duration="800"></div>
    <div class="box" data-aos="zoom-in" data-aos-delay="400" data-aos-duration="900"></div>
    <div class="box" data-aos="flip-up" data-aos-delay="500" data-aos-duration="1000"></div>
    <div class="box" data-aos="fade-down" data-aos-delay="600" data-aos-duration="1100"></div>
    <div class="box" data-aos="zoom-out" data-aos-delay="700" data-aos-duration="1200"></div>

    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        AOS.init({
            offset: 100,
            duration: 800,
            easing: 'ease-out-cubic',
            once: true
        });
    </script>

</body>
</html>
