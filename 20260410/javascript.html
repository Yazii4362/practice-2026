<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for문</title>
</head>
<body>
  
<script>

    for(let j = 1; j <= 10; j++){
        document.write(j + "<br>");
    }

    document.write("<hr>");


    for(let dan = 1; dan <= 9; dan++){
        document.write("2 X " + dan + " = " + (2 * dan) + "<br>");
    }

    document.write("<hr>");


    for(let dan = 2; dan <= 9; dan++){
        for(let n = 1; n <= 9; n++){
            document.write(
                dan + " X " + n + " = " + (dan * n) + "<br>"
            );
        }
        document.write("<br>");
    }



for(let i = 1; i <= 5; i++){      
    for(let j = 1; j<=i ; j++){  
        document.write("*");
    }
    document.write("<br>");
}for(let i = 5; i >= 1; i++){      
    for(let j = ; j<=i ; j++){  
        document.write("*");
    }
    document.write("<br>");
}

</script>

</body>
</html>
